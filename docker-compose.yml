services:
  app:
    build: .
    container_name: app
    volumes:
      - ./src:/var/www
      - /var/www/vendor
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "5050:80"
    volumes:
      - ./src:/var/www
      - /var/www/vendor
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
    driver: bridge